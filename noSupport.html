<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-container{
            width: 500px;
            min-width: 320px;
            height: 500px;
            display: flex;
            -ms-flex-direction: column;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .browsers-box{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        .browser-box{
            margin-right: 20px;
        }
        .browsers-box img{
            width: 60px;
            height: 60px;
        }
        p{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>This browser is not supported.</h1>
        <h3>For full support, please try one of the following:</h3>
        <div class="browsers-box">
            <div class="browser-box">
                <a href="https://www.google.com/intl/en_ca/chrome/"><img src="/images/browsers/chrome.svg" alt="chrome"></a>
                <p>Chrome</p>
            </div>
            <div class="browser-box">
                <a href="https://www.microsoft.com/en-us/edge"><img src="/images/browsers/edge.svg" alt="edge"></a>
                <p>Edge</p>
            </div>
            <div class="browser-box">
                <img src="/images/browsers/safari.svg" alt="safari">
                <p>Safari</p>
            </div> 
        </div>
    </div>
</body>
</html>
