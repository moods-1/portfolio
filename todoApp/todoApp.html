<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Moods</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
        <div class="main-container">
            <div class="title">
                <h1>Mood's Todos</h1>
            </div>
            <div class="list-container">
                <ul class="list"></ul>
            </div>
            
            
            <form class="adder">
                <input type="text" class="new-item default-font-size" name="user_input" id="user_input" 
                    placeholder="Add an item to the list"><br>
            </form>
            <form class="modifier default-font-size">
                <button class="save-btn default-font-size">Save list</button><br>
                <button class="dark-btn default-font-size">Dark</button>
                <button class="default-btn default-font-size">Default</button>
            </form> 
        </div> 
    <script src="app.js"></script>
</body>
</html>
