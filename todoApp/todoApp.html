<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Mood's Todos</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <div class="main-container">
        <div class="title"><h1>Mood's Todos</h1></div>
        <form class="adder">
            <input type="text" class="new-item" name="user_input" id="user_input" 
                placeholder="Add an item to the list">
        </form>
        <label for="complete-check" >Show completed</label>
        <input 
            type="checkbox" 
            name="complete-check" 
            class="complete-check" 
            id="complete-check">
        <div class="list-container"></div> 
        <div id="save-confirmation"></div> 
        <form class="modifier">
            <button class="save-btn">Save list</button>
            <button class="clear-btn">Clear list</button>
        </form> 
    </div> 
    <script src="app.js"></script>
</body>
</html>
