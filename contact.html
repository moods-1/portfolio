<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="/css/styles.css" />
    <link rel="stylesheet" type="text/css" href="/css/mediaQueries.css" />
    <title>Carl Moodie - Contact</title>
  </head>
  <body>
    <header>
      <div class="head-narrow">
        <div id="logo">
          <h1>CARL MOODIE</h1>
        </div>
        <nav id="top-nav">
          <ul class="nav-list">
            <li class="top-nav-list-item"><a href="#about-me">About</a></li>
            <li class="top-nav-list-item">
              <a href="contact.html">Contact</a>
            </li>
          </ul>
        </nav>
        <div id="burger-box" class="d-none">
          <img src="/images/burger.png" alt="burger" id="burger" />
        </div>
      </div>
    </header>
    <div class="d-none" id="vertical-nav">
      <ul class="nav-list">
        <li class="vertical-nav-list-item" onclick="handleLink()">
          <a href="#about">About</a>
        </li>
        <li class="vertical-nav-list-item" onclick="handleLink()">
          <a href="/contact.html">Contact</a>
        </li>
      </ul>
    </div>
    <div id="contact">
      <h1>CONTACT</h1>
      <div id="form-container">
        <form id="contact-form" method="post" action="">
          <label for="name"></label>
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Full name"
            maxlength="30"
            required
          /><br />
          <label for="email"></label>
          <input
            type="email"
            name="email"
            id="email"
            maxlength="30"
            placeholder="Email"
            required
          /><br />
          <label for="message"></label>
          <textarea
            name="message"
            id="message"
            placeholder="Message ..."
            cols="32"
            rows="7"
            required
          ></textarea
          ><br />
          <button type="submit" id="submit-btn">SEND</button>
        </form>
      </div>
    </div>
  </body>
</html>
